name: Release

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Build application
        run: npm run build

      - name: Generate App Token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ secrets.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Generate changelog
        uses: TriPSs/conventional-changelog-action@v6
        id: changelog
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          git-user-name: 'DataBK Auto Release'
          git-user-email: 'databk.auto.release@github.com'
          tag-prefix: ''

      - name: Build and push Docker images
        if: ${{ steps.changelog.outputs.skipped == 'false' }}
        run: |
          VERSION=${{ steps.changelog.outputs.version }}
          MAJOR=$(echo $VERSION | cut -d. -f1)
          
          docker buildx create --use
          
          # Login to Docker Hub
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          
          # Login to GitHub Container Registry
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          
          # Build and push to Docker Hub
          docker buildx build --push \
            --tag databk/rustdesk-console:latest \
            --tag databk/rustdesk-console:$VERSION \
            --tag databk/rustdesk-console:$MAJOR \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            .
          
          # Build and push to GitHub Container Registry
          docker buildx build --push \
            --tag ghcr.io/databk/rustdesk-console:latest \
            --tag ghcr.io/databk/rustdesk-console:$VERSION \
            --tag ghcr.io/databk/rustdesk-console:$MAJOR \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            .

      - name: Create GitHub Release
        if: ${{ steps.changelog.outputs.skipped == 'false' }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.changelog.outputs.version }}
          name: ${{ steps.changelog.outputs.version }}
          body: |
            ${{ steps.changelog.outputs.changelog }}
            
            ## Docker Images
            
            This release is available on:
            
            ### Docker Hub
            ```bash
            docker pull databk/rustdesk-console:${{ steps.changelog.outputs.version }}
            docker pull databk/rustdesk-console:latest
            ```
            
            ### GitHub Container Registry
            ```bash
            docker pull ghcr.io/databk/rustdesk-console:${{ steps.changelog.outputs.version }}
            docker pull ghcr.io/databk/rustdesk-console:latest
            ```
            
            ## Quick Start
            
            ```bash
            docker run -d \
              --name rustdesk-console \
              -p 3000:3000 \
              -e JWT_SECRET=your-secret-key \
              -e ADMIN_PASSWORD=your-password \
              databk/rustdesk-console:${{ steps.changelog.outputs.version }}
            ```
          draft: false
          prerelease: false
