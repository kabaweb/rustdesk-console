name: Build Custom RustDesk (Android)

on:
  workflow_dispatch:
    inputs:
      request_id:
        description: 'Build request UUID'
        required: true
        type: string
      rustdesk_repo:
        description: 'RustDesk source repo'
        required: true
        type: string
        default: 'rustdesk/rustdesk'
      rustdesk_ref:
        description: 'Git ref to build from'
        required: true
        type: string
        default: 'refs/tags/1.4.9'
      app_name:
        description: 'Custom app name'
        required: false
        type: string
        default: 'RustDesk'
      custom_config:
        description: 'JSON customization options'
        required: false
        type: string
        default: '{}'
      os:
        description: 'Target OS'
        required: false
        type: string
        default: 'android'
      arch:
        description: 'Target architecture'
        required: false
        type: string
        default: 'aarch64'

env:
  RUST_VERSION: "1.75"
  FLUTTER_VERSION: "3.44.1"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  NDK_VERSION: "r28c"
  APP_NAME: ${{ github.event.inputs.app_name }}

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        arch:
          - { ndk: arm64-v8a,  target: aarch64-linux-android,    flutter: android-arm64,  abi: arm64-v8a }
          - { ndk: armeabi-v7a, target: armv7-linux-androideabi, flutter: android-arm,    abi: armeabi-v7a }
          - { ndk: x86_64,      target: x86_64-linux-android,    flutter: android-x64,   abi: x86_64 }
    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be
        with:
          tool-cache: false
          android: false
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: false

      - name: Export GitHub Actions cache env
        uses: actions/github-script@d7906e4ad0b1822421a7e6a35d5ca353c962f410 # v6
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake curl gcc-multilib git g++ g++-multilib \
            libasound2-dev libc6-dev libclang-dev libunwind-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            libgtk-3-dev libpam0g-dev libpulse-dev libva-dev \
            libxcb-randr0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxdo-dev libxfixes-dev llvm-dev nasm ninja-build \
            openjdk-17-jdk-headless pkg-config wget

      - name: Checkout RustDesk source
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.rustdesk_repo }}
          ref: ${{ github.event.inputs.rustdesk_ref }}
          submodules: recursive
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Checkout customization script
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          path: .generator

      - name: Apply customizations
        run: python3 .generator/customize/apply.py '${{ github.event.inputs.custom_config }}'

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Setup Android NDK
        uses: nttld/setup-ndk@ed92fe6cadad69be94a966a7ee3271275e62f779 # v1
        id: setup-ndk
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          add-to-path: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: ${{ matrix.arch.target }}
          components: rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: android-${{ matrix.arch.abi }}

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: /opt/artifacts/vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install vcpkg dependencies
        run: |
          ANDROID_NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}
          export ANDROID_NDK_HOME
          ./flutter/build_android_deps.sh ${{ matrix.arch.ndk }}

      - name: Build RustDesk native lib
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          rustup target add ${{ matrix.arch.target }}
          cargo install cargo-ndk --version 3.1.2 --locked
          case ${{ matrix.arch.target }} in
            aarch64-linux-android)
              ./flutter/ndk_arm64.sh
              mkdir -p ./flutter/android/app/src/main/jniLibs/arm64-v8a
              cp ./target/${{ matrix.arch.target }}/release/liblibrustdesk.so ./flutter/android/app/src/main/jniLibs/arm64-v8a/librustdesk.so
              ;;
            armv7-linux-androideabi)
              ./flutter/ndk_arm.sh
              mkdir -p ./flutter/android/app/src/main/jniLibs/armeabi-v7a
              cp ./target/${{ matrix.arch.target }}/release/liblibrustdesk.so ./flutter/android/app/src/main/jniLibs/armeabi-v7a/librustdesk.so
              ;;
            x86_64-linux-android)
              ./flutter/ndk_x64.sh
              mkdir -p ./flutter/android/app/src/main/jniLibs/x86_64
              cp ./target/${{ matrix.arch.target }}/release/liblibrustdesk.so ./flutter/android/app/src/main/jniLibs/x86_64/librustdesk.so
              ;;
          esac

      - name: Upload native lib
        uses: actions/upload-artifact@v4
        with:
          name: librustdesk.so.${{ matrix.arch.target }}
          path: ./target/${{ matrix.arch.target }}/release/liblibrustdesk.so

      - name: Build APK
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          export PATH=/usr/lib/jvm/java-17-openjdk-amd64/bin:$PATH
          sed -i 's/org.gradle.jvmargs=-Xmx1024M/org.gradle.jvmargs=-Xmx2g/g' ./flutter/android/gradle.properties
          sed -i 's/signingConfigs.release/signingConfigs.debug/g' ./flutter/android/app/build.gradle

          ABI_DIR=${{ matrix.arch.abi }}
          NDK_SYSROOT=${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/sysroot

          mkdir -p "./flutter/android/app/src/main/jniLibs/$ABI_DIR"

          if [ -f "./target/${{ matrix.arch.target }}/release/liblibrustdesk.so" ]; then
            cp "./target/${{ matrix.arch.target }}/release/liblibrustdesk.so" \
              "./flutter/android/app/src/main/jniLibs/$ABI_DIR/librustdesk.so"
          fi

          pushd flutter
          flutter build apk --release --target-platform ${{ matrix.arch.flutter }} --split-per-abi
          popd

          mkdir -p apks
          mv "flutter/build/app/outputs/flutter-apk/app-${{ matrix.arch.flutter }}-release.apk" \
            "apks/${{ env.APP_NAME }}-${{ matrix.arch.abi }}-release.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ matrix.arch.abi }}-release.apk
          path: apks/*.apk
          retention-days: 7

  universal:
    needs: [build]
    runs-on: ubuntu-24.04
    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be
        with:
          tool-cache: false
          android: false
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: false

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk-headless

      - name: Checkout RustDesk source
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.rustdesk_repo }}
          ref: ${{ github.event.inputs.rustdesk_ref }}
          submodules: recursive
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Download arm64 lib
        uses: actions/download-artifact@v4
        with:
          name: librustdesk.so.aarch64-linux-android
          path: ./flutter/android/app/src/main/jniLibs/arm64-v8a

      - name: Download armv7 lib
        uses: actions/download-artifact@v4
        with:
          name: librustdesk.so.armv7-linux-androideabi
          path: ./flutter/android/app/src/main/jniLibs/armeabi-v7a

      - name: Download x86_64 lib
        uses: actions/download-artifact@v4
        with:
          name: librustdesk.so.x86_64-linux-android
          path: ./flutter/android/app/src/main/jniLibs/x86_64

      - name: Build universal APK
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
        run: |
          export PATH=/usr/lib/jvm/java-17-openjdk-amd64/bin:$PATH
          sed -i 's/org.gradle.jvmargs=-Xmx1024M/org.gradle.jvmargs=-Xmx2g/g' ./flutter/android/gradle.properties
          sed -i 's/signingConfigs.release/signingConfigs.debug/g' ./flutter/android/app/build.gradle

          for dir in arm64-v8a armeabi-v7a x86_64; do
            so="./flutter/android/app/src/main/jniLibs/$dir/liblibrustdesk.so"
            [ -f "$so" ] && mv "$so" "./flutter/android/app/src/main/jniLibs/$dir/librustdesk.so"
          done

          pushd flutter
          flutter build apk --release --target-platform android-arm64,android-arm,android-x64
          popd

          mkdir -p apks
          mv "flutter/build/app/outputs/flutter-apk/app-release.apk" \
            "apks/${{ env.APP_NAME }}-universal-release.apk"

      - name: Upload universal APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-universal-release.apk
          path: apks/*.apk
          retention-days: 7
