name: Build Custom RustDesk (Windows)

on:
  workflow_dispatch:
    inputs:
      request_id:
        description: 'Build request UUID'
        required: true
        type: string
      rustdesk_repo:
        description: 'RustDesk source repo'
        required: true
        type: string
        default: 'rustdesk/rustdesk'
      rustdesk_ref:
        description: 'Git ref to build from'
        required: true
        type: string
        default: 'refs/tags/1.4.9'
      app_name:
        description: 'Custom app name'
        required: false
        type: string
        default: 'RustDesk'
      custom_config:
        description: 'JSON customization options'
        required: false
        type: string
        default: '{}'
      os:
        description: 'Target OS'
        required: false
        type: string
        default: 'windows'
      arch:
        description: 'Target architecture'
        required: false
        type: string
        default: 'x86_64'

env:
  SCITER_RUST_VERSION: "1.75"
  LLVM_VERSION: "15.0.6"
  FLUTTER_VERSION: "3.24.5"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  APP_NAME: ${{ github.event.inputs.app_name }}

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Set arch-specific variables
        id: arch
        shell: bash
        run: |
          ARCH="${{ github.event.inputs.arch }}"
          if [ "$ARCH" = "x86" ]; then
            echo "RUST_TARGET=i686-pc-windows-msvc" >> $GITHUB_ENV
            echo "ENGINE_ZIP=windows-x86-release.zip" >> $GITHUB_ENV
            echo "ENGINE_DIR=windows-x86-release" >> $GITHUB_ENV
            echo "FLUTTER_ARCH=x86" >> $GITHUB_ENV
            echo "VCPKG_TRIPLET=x86-windows-static" >> $GITHUB_ENV
          else
            echo "RUST_TARGET=x86_64-pc-windows-msvc" >> $GITHUB_ENV
            echo "ENGINE_ZIP=windows-x64-release.zip" >> $GITHUB_ENV
            echo "ENGINE_DIR=windows-x64-release" >> $GITHUB_ENV
            echo "FLUTTER_ARCH=x64" >> $GITHUB_ENV
            echo "VCPKG_TRIPLET=x64-windows-static" >> $GITHUB_ENV
          fi

      - name: Export GitHub Actions cache env
        uses: actions/github-script@d7906e4ad0b1822421a7e6a35d5ca353c962f410 # v6
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Checkout RustDesk source
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.rustdesk_repo }}
          ref: ${{ github.event.inputs.rustdesk_ref }}
          submodules: recursive
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Checkout customization script
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          path: .generator

      - name: Apply customizations
        run: |
          python3 .generator/customize/apply.py '${{ github.event.inputs.custom_config }}'

      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: ${{ env.LLVM_VERSION }}

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}
          architecture: x64

      - name: Replace Flutter engine
        shell: pwsh
        run: |
          flutter doctor -v
          flutter precache --windows
          $enginePath = "C:/hostedtoolcache/windows/flutter/stable-$env:FLUTTER_VERSION-x64/bin/cache/artifacts/engine/$env:ENGINE_DIR"
          New-Item -ItemType Directory -Force -Path $enginePath
          Invoke-WebRequest -Uri "https://github.com/rustdesk/engine/releases/download/main/$env:ENGINE_ZIP" -OutFile engine.zip
          Expand-Archive -Path engine.zip -DestinationPath engine_extracted
          Copy-Item -Recurse -Force engine_extracted/* "$enginePath/"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.SCITER_RUST_VERSION }}
          targets: ${{ env.RUST_TARGET }}

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: windows-2022-${{ github.event.inputs.arch }}

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: C:\vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}

      - name: Install vcpkg dependencies
        shell: bash
        run: |
          $VCPKG_ROOT/vcpkg install --triplet $VCPKG_TRIPLET --x-install-root="$VCPKG_ROOT/installed"

      - name: Build RustDesk
        shell: bash
        run: |
          python3 build.py --portable --flutter --skip-portable-pack --hwcodec --vram --target $RUST_TARGET
          mv "./flutter/build/windows/$FLUTTER_ARCH/runner/Release" ./rustdesk

      - name: Package output
        shell: bash
        run: |
          mkdir -p ./output
          find ./rustdesk -name '*.exe' -exec cp {} ./output/ \;
          find ./rustdesk -name '*.dll' -exec cp {} ./output/ \;
          ls -la ./output/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ github.event.inputs.arch }}
          path: ./output/*
          retention-days: 7
