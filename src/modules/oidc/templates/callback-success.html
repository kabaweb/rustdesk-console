<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>认证成功</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
    }
    .container {
      text-align: center;
      padding: 40px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      max-width: 400px;
    }
    .icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    h1 {
      color: #333;
      margin: 0 0 12px;
      font-size: 24px;
    }
    p {
      color: #666;
      margin: 0;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">&#10003;</div>
    <h1>{{title}}</h1>
    <p>{{message}}</p>
  </div>
  <script>
    (function() {
      var token = '{{token}}';
      var callbackUrl = '{{callbackUrl}}';
      
      if (token && callbackUrl) {
        var TOKEN_KEY = 'rustdesk_access_token';
        var rememberMe = localStorage.getItem('rememberMe') === '1';
        
        if (rememberMe) {
          localStorage.setItem(TOKEN_KEY, token);
          sessionStorage.removeItem(TOKEN_KEY);
        } else {
          sessionStorage.setItem(TOKEN_KEY, token);
          localStorage.removeItem(TOKEN_KEY);
        }
        
        window.location.href = callbackUrl;
      }
    })();
  </script>
</body>
</html>
